_base_: "exp_b2_all.yaml"

# Phase 0 preflight: 1 epoch of B2 training to verify that the full B2 pipeline runs.
# Takes ~3-5 minutes on a T4. Run this first before launching the real Phase 0
# (exp_b2_all), so you don't discover a config error after 3 hours of training.

experiment:
  name: "exp_b2_preflight"
  tags: ["b2", "preflight", "sanity_check"]

training:
  num_train_epochs: 1
  eval_steps: 50
  save_steps: 50
  save_total_limit: 1
