_base_: "base.yaml"

# Smoke test: 2 epochs, verifies that the KD pipeline runs end-to-end.
# Takes ~3-5 minutes on a T4. Invoke with force_fresh=True; the resulting
# metrics are not meant to be used as a real evaluation.

experiment:
  name: "exp_kd_smoke"
  tags: ["kd", "smoke", "sanity_check"]

training:
  num_train_epochs: 2
  learning_rate: 4.0e-5
  eval_steps: 50
  save_steps: 50
  logging_steps: 10
  save_total_limit: 1

kd:
  enabled: true
  method: "logit"
  teacher_checkpoint: null
  temperature: 4.0
  alpha: 0.5
